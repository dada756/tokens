name: Generate Clearance Token

on:
  repository_dispatch:
    types: [generate-clearance-token]
  workflow_dispatch: # Allows manual triggering from the GitHub UI for testing

jobs:
  extract_token:
    runs-on: ubuntu-24.04 # Pinning to Ubuntu 24.04 as per your server management standard
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install curl_cffi beautifulsoup4 requests
          
      - name: Install Cloudflare WARP
        run: |
          curl -fsSL https://pkg.cloudflareclient.com/pubkey.gpg | sudo gpg --yes --dearmor --output /usr/share/keyrings/cloudflare-warp-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/cloudflare-warp-archive-keyring.gpg] https://pkg.cloudflareclient.com/ $(lsb_release -cs) main" | sudo tee /etc/apt/sources.list.d/cloudflare-client.list
          sudo apt-get update
          sudo apt-get install -y cloudflare-warp

      - name: Configure and Connect WARP Proxy
        run: |
          # Register a new ephemeral WARP client
          warp-cli --accept-tos registration new
          
          # Switch to proxy mode (SOCKS5 on port 40000)
          warp-cli --accept-tos mode proxy
          warp-cli --accept-tos proxy port 40000
          
          # Connect to the WARP network
          warp-cli --accept-tos connect
          
          # Allow connection to stabilize
          sleep 5
          
          # Verify proxy IP (Should be a Cloudflare IP, not an Azure Datacenter IP)
          curl -x socks5h://127.0.0.1:40000 https://cloudflare.com/cdn-cgi/trace
          
      - name: Execute Bypass Engine
        env:
          VERCEL_API_URL: ${{ secrets.VERCEL_API_URL }}
          INTERNAL_API_SECRET: ${{ secrets.INTERNAL_API_SECRET }}
        run: |
          python bypass.py
          
      - name: Teardown WARP
        if: always()
        run: |
          warp-cli --accept-tos disconnect
